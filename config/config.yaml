# Конфигурация сервера
server:
  host: "0.0.0.0"
  port: 8080

database:
  path: "./data/chat.db"

# Логирование
logging:
  level: INFO
  format: json

# Кластер
cluster:
  # Общий секрет для аутентификации межсерверного трафика (issue #10).
  # Все узлы кластера должны использовать один и тот же секрет.
  # ВНИМАНИЕ: значение ниже — только для локальной разработки. В проде
  # задавайте секрет через переменную окружения CLUSTER_SECRET и НЕ храните
  # его в репозитории.
  secret: "dev-cluster-secret-change-me"
