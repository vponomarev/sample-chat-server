# Конфигурация сервера
server:
  host: "0.0.0.0"
  port: 8080
  # CORS: разрешённые Origin через запятую или "*" (все). По умолчанию "*" —
  # для локального стенда; в проде укажите конкретные домены (issue #16).
  # Переопределяется переменной окружения CORS_ALLOWED_ORIGINS.
  # cors_allowed_origins: "https://chat.example.com,https://admin.example.com"
  cors_allowed_origins: "*"

database:
  path: "./data/chat.db"

# Логирование
logging:
  level: INFO
  format: json

# Кластер
cluster:
  # Общий секрет для аутентификации межсерверного трафика (issue #10).
  # Все узлы кластера должны использовать один и тот же секрет.
  # ВНИМАНИЕ: значение ниже — только для локальной разработки. В проде
  # задавайте секрет через переменную окружения CLUSTER_SECRET и НЕ храните
  # его в репозитории.
  secret: "dev-cluster-secret-change-me"
  # Режим репликации (Этап 4.2): "async" (умолч.) — низкая задержка, реплики
  # догоняют фоном; "sync" — master подтверждает запись только после приёма
  # большинством узлов (durable на кворуме ценой задержки). Переопределяется
  # переменной окружения REPLICATION_MODE.
  replication_mode: "async"
