[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["server/tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
# По умолчанию исключаем integration: они поднимают реальные процессы-узлы и
# чувствительны к нагрузке хоста (антивирус/ИБ-агент, параллельные тесты) —
# в общем прогоне это давало ложные падения. Запуск явно: pytest -m integration.
addopts = "-v --tb=short -m 'not integration'"
markers = [
    "integration: сквозные тесты, поднимающие реальные процессы (медленные; запуск: -m integration)",
]

[tool.coverage.run]
source = ["server"]
omit = [
    "server/tests/*",
    "server/__init__.py",
    "server/*/(__init__.py)",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "@abstractmethod",
]
